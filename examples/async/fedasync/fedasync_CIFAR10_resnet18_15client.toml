[general]
base_path = "./async_fedavg_CIFAR10_resnet18_15client_p10_ver3"

[clients]

# Type
type = "simple"

# The total number of clients
total_clients = 15

# The number of clients selected in each round
per_round = 5

# Should the clients compute test accuracy locally?
do_test = false

# Whether client heterogeneity should be simulated
speed_simulation = true
comm_simulation = false
sleep_simulation = false

[clients.simulation_distribution]

# The simulation distribution
# staleness is simulated from uniform distribution as mentioned in Section 5.2
distribution = "uniform"
low = 0
high = 20

[server]
address = "127.0.0.1"
port = 8000
synchronous = false
simulate_wall_time = true
periodic_interval=1
ping_interval=30
ping_timeout=3600


# Parameter for FedAsync
staleness_bound = 11
minimum_clients_aggregated = 1
mixing_hyperparameter = 0.9
adaptive_mixing = true
eval_interval = 50

[server.staleness_weighting_function]
type = "polynomial"
a = 0.5

[data]

# The training and testing dataset
datasource = "Torchvision"
dataset_name = "CIFAR10"
download = true

# Number of samples in each partition
partition_size = 3330

# IID or non-IID?
sampler = "noniid"

# The concentration parameter for the Dirichlet distribution
concentration = 0.3

random_seed = 8888

[trainer]

# The type of the trainer
type = "basic"

# The maximum number of training rounds
rounds = 20000

# The maximum number of clients running concurrently
max_concurrency = 5

# The target accuracy
target_accuracy = 0.97

# The machine learning model
model_name = "resnet_18"

# Number of epoches for local training in each communication round
epochs = 1
batch_size = 64
optimizer = "SGD"

[algorithm]

# Aggregation algorithm
type = "fedavg"

[parameters]

[parameters.optimizer]
lr = 0.001
momentum = 0.9
weight_decay = 0.0005

[results]

# Write the following parameter(s) into a CSV
types = "round, elapsed_time, accuracy, train_loss, valid_loss"

record_clients_accuracy = false
